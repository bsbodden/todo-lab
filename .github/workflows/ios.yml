# Builds this app's iOS app on a GitHub-hosted macOS runner — the no-Mac path.
# Produces an iOS *Simulator* .app (NO code signing, NO Apple account), uploads it as an artifact, and
# (optionally) pushes it to Appetize.io for a shareable browser link you open on your iPhone.
#   • Public repo  → macOS runners are UNLIMITED FREE.
#   • Private repo → macOS minutes bill at 10x (Free plan 2,000 min ÷ 10 ≈ 200 macOS min/mo ≈ 10–15 builds).
# Manual trigger only (conserves minutes). To stream on Appetize, add an APPETIZE_TOKEN repo secret.
name: iOS (free simulator build)

on:
  workflow_dispatch:

jobs:
  build-ios-simulator:
    runs-on: macos-15
    env:
      APPETIZE_TOKEN: ${{ secrets.APPETIZE_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Select the latest stable Xcode
        # Compose 1.11's Kotlin/Native bundled UIKit references iOS-18 symbols (e.g. UIViewLayoutRegion);
        # link against a matching (newest) iOS SDK so they resolve.
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: "21"

      - name: Ensure the Gradle wrapper jar exists
        # a global `*.jar` gitignore commonly drops gradle-wrapper.jar from a copied repo; fetch it if absent
        # (the wrapper jar is version-agnostic — it just bootstraps the distributionUrl in the .properties)
        run: |
          test -f gradle/wrapper/gradle-wrapper.jar || curl -fsSL -o gradle/wrapper/gradle-wrapper.jar \
            https://raw.githubusercontent.com/gradle/gradle/v8.13.0/gradle/wrapper/gradle-wrapper.jar

      - name: Build the Kotlin/Native framework (iOS Simulator, arm64)
        run: ./gradlew :linkDebugFrameworkIosSimulatorArm64 --no-daemon --stacktrace

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate the Xcode project
        working-directory: iosApp
        run: xcodegen generate

      - name: Build the .app (iOS Simulator, no signing)
        working-directory: iosApp
        run: |
          xcodebuild \
            -project iosApp.xcodeproj \
            -scheme iosApp \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO \
            ARCHS=arm64 ONLY_ACTIVE_ARCH=NO \
            ENABLE_DEBUG_DYLIB=NO \
            build

      - name: Package the .app
        working-directory: iosApp
        run: |
          APP=$(find build/Build/Products/Debug-iphonesimulator -maxdepth 1 -name '*.app' | head -1)
          echo "Built: $APP"
          ( cd "$(dirname "$APP")" && ditto -c -k --sequesterRsrc --keepParent "$(basename "$APP")" "$GITHUB_WORKSPACE/app-simulator.zip" )

      - name: Upload .app artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-simulator-app
          path: app-simulator.zip

      - name: Stream on Appetize.io (optional — set the APPETIZE_TOKEN secret)
        if: ${{ env.APPETIZE_TOKEN != '' }}
        run: |
          resp=$(curl -sS -X POST "https://${APPETIZE_TOKEN}@api.appetize.io/v1/apps" \
            -F "file=@$GITHUB_WORKSPACE/app-simulator.zip" -F "platform=ios")
          echo "$resp"
          url=$(echo "$resp" | python3 -c "import sys,json;print(json.load(sys.stdin).get('publicURL',''))" 2>/dev/null || true)
          echo "### 📱 Open this on your iPhone's browser: $url" >> "$GITHUB_STEP_SUMMARY"
